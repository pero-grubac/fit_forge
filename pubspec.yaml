name: fit_forge
description: FitForge
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigacija
  go_router: ^13.2.4

  # Lokalna baza
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # JSON serijalizacija
  json_annotation: ^4.9.0

  # Dependency injection
  get_it: ^7.7.0

  # Grafovi
  fl_chart: ^0.68.0

  # Notifikacije
  #  flutter_local_notifications: ^17.1.2
  # timezone: ^0.9.4

  # Slike vjezbi
  image_picker: ^1.1.2

  # Utility
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true